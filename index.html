<!DOCTYPE html>
<html>
<head>
  <title>Hard Maze Game</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    canvas {
      border: 4px solid purple;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2 id="levelText">Level 1</h2>
<p id="info">Coins: 0</p>

<canvas id="game" width="450" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 15;
const tile = 30;

/* -------- HARDER LEVEL -------- */
function generateMaze() {
  let maze = [];

  for (let y = 0; y < size; y++) {
    let row = [];
    for (let x = 0; x < size; x++) {

      // borders
      if (x === 0 || y === 0 || x === size-1 || y === size-1) {
        row.push(1);
      } else {
        // MORE WALLS (hard!)
        row.push(Math.random() < 0.45 ? 1 : 0);
      }

    }
    maze.push(row);
  }

  // make sure start & goal are free
  maze[1][1] = 0;
  maze[size-2][size-2] = 0;

  return maze;
}

let maze;
let player, goal, coins, enemy;
let collected = 0;
let level = 1;

/* SAFE SPOT */
function getEmpty() {
  let x, y;
  do {
    x = Math.floor(Math.random() * (size-2)) + 1;
    y = Math.floor(Math.random() * (size-2)) + 1;
  } while (maze[y][x] !== 0);
  return {x,y};
}

function start() {
  maze = generateMaze();

  player = {x:1,y:1};
  goal = {x:size-2,y:size-2};

  coins = [];
  for (let i = 0; i < level + 3; i++) {
    coins.push(getEmpty());
  }

  enemy = getEmpty();
  collected = 0;

  updateUI();
  draw();
}

function draw() {
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      ctx.fillStyle = maze[y][x] ? "purple" : "#111";
      ctx.fillRect(x*tile,y*tile,tile,tile);
    }
  }

  ctx.fillStyle="gold";
  coins.forEach(c=>{
    ctx.fillRect(c.x*tile+6,c.y*tile+6,18,18);
  });

  ctx.fillStyle="red";
  ctx.fillRect(enemy.x*tile,enemy.y*tile,tile,tile);

  ctx.fillStyle="lime";
  ctx.fillRect(goal.x*tile,goal.y*tile,tile,tile);

  ctx.fillStyle="cyan";
  ctx.fillRect(player.x*tile,player.y*tile,tile,tile);
}

function move(dx,dy) {
  let nx = player.x + dx;
  let ny = player.y + dy;

  if (maze[ny][nx] === 0) {
    player.x = nx;
    player.y = ny;
  }

  // coins
  coins = coins.filter(c=>{
    if (c.x === player.x && c.y === player.y) {
      collected++;
      return false;
    }
    return true;
  });

  // lose
  if (player.x === enemy.x && player.y === enemy.y) {
    alert("CAUGHT 😈");
    start(); return;
  }

  // win
  if (player.x === goal.x && player.y === goal.y && coins.length === 0) {
    level++;
    start();
    return;
  }

  moveEnemy();
  updateUI();
  draw();
}

function moveEnemy() {
  let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  let d = dirs[Math.floor(Math.random()*4)];

  let nx = enemy.x + d[0];
  let ny = enemy.y + d[1];

  if (maze[ny][nx] === 0) {
    enemy.x = nx;
    enemy.y = ny;
  }
}

function updateUI() {
  document.getElementById("levelText").innerText = "Level " + level;
  document.getElementById("info").innerText = "Coins: " + collected;
}

document.addEventListener("keydown", e=>{
  if (e.key==="ArrowUp") move(0,-1);
  if (e.key==="ArrowDown") move(0,1);
  if (e.key==="ArrowLeft") move(-1,0);
  if (e.key==="ArrowRight") move(1,0);
});

start();
</script>

</body>
</html>
